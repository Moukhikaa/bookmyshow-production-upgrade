services:
  - type: web
    name: bookmyshow-production-upgrade
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python -m gunicorn bookmyseat.wsgi:application
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CREATE_DEPLOY_ADMIN
        value: "True"
      - key: ADMIN_USERNAME
        value: "moukh"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SEED_DEMO_DATA
        value: "True"
      - key: ALLOW_DEVELOPMENT_PAYMENTS
        value: "True"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: DJANGO_CACHE_BACKEND
        value: "django.core.cache.backends.locmem.LocMemCache"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
