services:
  - type: keyvalue
    name: bookmyshow-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: bookmyshow-web
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python -m gunicorn bookmyseat.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookmyshow-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: bookmyshow-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: bookmyshow-redis
          property: connectionString
      - key: SEED_DEMO_DATA
        value: "True"
      - key: ALLOW_DEVELOPMENT_PAYMENTS
        value: "False"
      - key: CREATE_DEPLOY_ADMIN
        value: "True"
      - key: ADMIN_USERNAME
        value: "moukh"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DJANGO_CACHE_BACKEND
        value: django_redis.cache.RedisCache
      - key: DJANGO_CACHE_LOCATION
        fromService:
          type: keyvalue
          name: bookmyshow-redis
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - type: worker
    name: bookmyshow-celery-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A bookmyseat worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookmyshow-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: bookmyshow-web
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: bookmyshow-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: bookmyshow-redis
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - type: worker
    name: bookmyshow-celery-beat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A bookmyseat beat -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookmyshow-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: bookmyshow-web
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: bookmyshow-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: bookmyshow-redis
          property: connectionString

databases:
  - name: bookmyshow-db
    plan: free
    databaseName: bookmyshow
    user: bookmyshow
